{% load static %}
<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Library</title>

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body>

<div class="app-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="sidebar-header">
            <h1 class="logo">📚 Library</h1>
        </div>

        <nav class="sidebar-nav">
            <a class="nav-item" href="/books/">📖 Books</a>
            <a class="nav-item" href="/borrowed/">📥 Borrowed</a>
            <a class="nav-item" href="/favorites/">❤️ Favorites</a>
            <a class="nav-item" href="/">🏠 Dashboard</a>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-icon">🌙</button>
        </div>

    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <header class="header">
            <div class="header-left">
                <h2 class="section-title">Library System</h2>
            </div>

            <div class="header-right">
                <form class="search-box" action="{% url 'book_search' %}" method="get">
                    <input type="text" name="title" placeholder="Search books...">
                </form>

                <div class="user-profile">
                    <img src="https://i.pravatar.cc/100" alt="">
                </div>
            </div>
        </header>

        {% if messages %}
        <div class="messages-container" style="padding:0 24px; margin-top:12px;">
            {% for message in messages %}
                <div class="flash-message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <section class="section active">
            {% block content %}{% endblock %}
        </section>

    </main>

</div>

<script>
// When header search is submitted, copy category/available/sort selects from page
document.addEventListener('DOMContentLoaded', function(){
    const headerForm = document.querySelector('form.search-box');
    if (!headerForm) return;

    headerForm.addEventListener('submit', function(e){
        // remove previously added hidden inputs
        headerForm.querySelectorAll('.injected-param').forEach(n => n.remove());

        ['category','available','sort'].forEach(name => {
            const el = document.querySelector(`[name="${name}"]`);
            if (el && el.value) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = name;
                input.value = el.value;
                input.className = 'injected-param';
                headerForm.appendChild(input);
            }
        });
    });
});
</script>

<script>
// CSRF helper
function getCookie(name) {
    const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
    return v ? v.pop() : '';
}

document.addEventListener('submit', function(e){
    const form = e.target;
    if (!form.classList.contains('favorite-form')) return;
    e.preventDefault();

    const url = form.action;
    const btn = form.querySelector('.favorite-btn');
    const csrftoken = getCookie('csrftoken');

    fetch(url, {
        method: 'POST',
        headers: {
            'X-CSRFToken': csrftoken,
            'X-Requested-With': 'XMLHttpRequest'
        },
        body: new URLSearchParams(new FormData(form))
    })
    .then(resp => resp.json())
    .then(data => {
        if (data.is_favorite) {
            if (btn) { btn.textContent = 'Bỏ thích ❤️'; btn.classList.remove('btn-ghost'); btn.classList.add('btn-outline'); }
        } else {
            if (btn) { btn.textContent = 'Yêu thích ❤️'; btn.classList.remove('btn-outline'); btn.classList.add('btn-ghost'); }
            // if we're on favorites list, remove the card
            const card = form.closest('.book-link') || form.closest('.book-card');
            if (card && document.querySelector('.favorites')) {
                card.remove();
            }
        }
    }).catch(err => {
        console.error('Favorite toggle failed', err);
    });
});
</script>

</body>
</html>
