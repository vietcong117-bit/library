{% extends "base.html" %}

{% block content %}
<div style="max-width:480px; margin:24px auto;">
    <h2>Xác nhận xóa tài khoản</h2>
    <p>Bạn có chắc muốn xóa tài khoản <strong>{{ user.username }}</strong> không?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Xóa</button>
        <a href="{% url 'admin_user_list' %}">Hủy</a>
    </form>
</div>
{% endblock %}
