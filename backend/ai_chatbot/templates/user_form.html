{% extends "base.html" %}

{% block content %}
<div style="max-width:720px; margin:24px auto;">
    <h2>Chỉnh sửa tài khoản: {{ user.username }}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Lưu</button>
        <a href="{% url 'admin_user_list' %}" class="btn-link">Hủy</a>
    </form>
</div>
{% endblock %}
