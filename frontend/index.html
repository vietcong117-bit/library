<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thư viện trực tuyến</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
    h1 { color: #2c3e50; text-align: center; }
    .book-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
    .book-card { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .book-card h3 { margin: 0; color: #2980b9; }
    .book-card p { margin: 5px 0; color: #555; }
    .status { font-weight: bold; }
    .available { color: green; }
    .unavailable { color: red; }
  </style>
</head>
<body>
  <h1>📚 Danh sách sách trong thư viện</h1>

  <div class="book-list">
    <div class="book-card">
      <h3>Lập trình Python</h3>
      <p>Tác giả: Nguyễn Văn A</p>
      <p>Năm xuất bản: 2022</p>
      <p class="status available">✅ Còn</p>
    </div>

    <div class="book-card">
      <h3>Trí tuệ nhân tạo</h3>
      <p>Tác giả: Trần Thị B</p>
      <p>Năm xuất bản: 2021</p>
      <p class="status unavailable">❌ Đã mượn</p>
    </div>

    <div class="book-card">
      <h3>Cơ sở dữ liệu</h3>
      <p>Tác giả: Lê Văn C</p>
      <p>Năm xuất bản: 2020</p>
      <p class="status available">✅ Còn</p>
    </div>
  </div>
</body>
</html>
