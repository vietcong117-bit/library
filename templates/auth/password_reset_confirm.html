{% extends "base.html" %}

{% block content %}
<div class="password-reset-container" style="max-width: 450px; margin: 40px auto; padding: 0 20px;">
    <div style="text-align: center; margin-bottom: 32px;">
        <h2 style="font-size: 24px; color: #1e293b; margin: 0;">Đặt mật khẩu mới</h2>
        <p style="color: #64748b; font-size: 14px; margin-top: 8px;">
            Nhập mật khẩu mới cho tài khoản của bạn.
        </p>
    </div>

    <div style="background: white; padding: 32px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
        <form method="post">
            {% csrf_token %}
            
            {% for field in form %}
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px; font-size: 13px; color: #475569;">
                        {{ field.label }}
                    </label>
                    <div style="width: 100%;">
                        {{ field }}
                    </div>
                    {% if field.errors %}
                        <div style="color: #ef4444; font-size: 12px; margin-top: 6px;">
                            {{ field.errors.as_text }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" style="width: 100%; background: #6366f1; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer;">
                Đổi mật khẩu
            </button>
        </form>
    </div>
</div>

<style>
    .password-reset-container input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 15px;
    }
    .password-reset-container input:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
</style>
{% endblock %}
