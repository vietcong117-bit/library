{% extends "base.html" %}

{% block content %}
<div class="password-reset-container" style="max-width: 450px; margin: 80px auto; padding: 0 20px; text-align: center;">
    <div style="background: white; padding: 48px 32px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
        <div style="font-size: 48px; margin-bottom: 24px;">✅</div>
        
        <h2 style="font-size: 24px; color: #1e293b; margin-bottom: 16px;">Đã gửi email!</h2>
        
        <p style="color: #64748b; font-size: 14px; line-height: 1.6; margin-bottom: 32px;">
            Chúng tôi đã gửi hướng dẫn đặt lại mật khẩu đến địa chỉ email của bạn. 
            Vui lòng kiểm tra hộp thư đến (và cả mục Spam nếu không thấy).
        </p>

        <a href="{% url 'login' %}" style="display: inline-block; background: #6366f1; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; transition: background 0.2s;">
            Về trang đăng nhập
        </a>
    </div>
</div>
{% endblock %}
